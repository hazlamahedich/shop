name: Story 11-2 E2E Tests

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'backend/app/services/multi_turn/**'
      - 'backend/app/services/clarification/**'
      - 'backend/app/api/multi_turn.py'
      - 'backend/tests/unit/test_constraint_accumulator.py'
      - 'backend/tests/unit/test_multi_turn_*.py'
      - 'backend/tests/unit/test_conversation_lock.py'
      - 'backend/tests/unit/test_message_classifier.py'
      - 'backend/tests/unit/test_state_machine_complete_transitions.py'
      - 'frontend/tests/e2e/story-11-2-*'
      - 'frontend/tests/helpers/multi-turn-test-helpers.ts'
      - '.github/workflows/story-11-2-e2e-tests.yml'
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  backend-unit-tests:
    name: Multi-Turn Unit Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: shop_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'backend/pyproject.toml'

      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Run multi-turn unit tests
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/shop_test
          TEST_DATABASE_URL: postgresql+asyncpg://test_user:test_password@localhost:5432/shop_test
          IS_TESTING: true
          SECRET_KEY: test-secret-key-for-ci-cd
        run: |
          python -m pytest \
            tests/unit/test_constraint_accumulator.py \
            tests/unit/test_multi_turn_state_machine.py \
            tests/unit/test_multi_turn_schemas.py \
            tests/unit/test_message_classifier.py \
            tests/unit/test_conversation_lock.py \
            tests/unit/test_state_machine_complete_transitions.py \
            -v --tb=short --cov=app/services/multi_turn --cov-report=xml --cov-report=term

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./backend/coverage.xml
          flags: story-11-2-unit
          name: Story 11-2 Unit Coverage

  frontend-e2e-tests:
    name: Multi-Turn E2E Tests (Playwright)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: ./frontend
        run: npx playwright install --with-deps chromium

      - name: Run Story 11-2 E2E tests
        working-directory: ./frontend
        run: |
          npx playwright test \
            --project=chromium \
            --grep "Story 11.2" \
            --reporter=html
        env:
          CI: true

      - name: Archive test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: story-11-2-e2e-results
          path: |
            frontend/playwright-report/
            frontend/test-results/
          retention-days: 30
