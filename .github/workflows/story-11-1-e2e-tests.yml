name: Story 11-1 E2E Tests

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'backend/app/services/conversation_context.py'
      - 'backend/app/api/conversation_context.py'
      - 'backend/tests/integration/test_story_11_1_e2e.py'
      - 'backend/app/models/conversation_context.py'
      - '.github/workflows/story-11-1-e2e-tests.yml'
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  e2e-tests:
    name: Conversation Context E2E Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: shop_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'backend/pyproject.toml'

      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Setup database
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/shop_test
          SKIP_MIGRATIONS: false
        run: |
          chmod +x scripts/setup_e2e_database.sh
          ./scripts/setup_e2e_database.sh

      - name: Run E2E tests
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/shop_test
          TEST_DATABASE_URL: postgresql+asyncpg://test_user:test_password@localhost:5432/shop_test
          IS_TESTING: true
          DEBUG: true
          SECRET_KEY: test-secret-key-for-ci-cd
          MOCK_STORE_ENABLED: true
        run: |
          python -m pytest tests/integration/test_story_11_1_e2e.py -v --tb=short --cov=app --cov-report=xml --cov-report=term

      - name: Cleanup database
        if: always()
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/shop_test
        run: |
          chmod +x scripts/cleanup_e2e_database.sh
          ./scripts/cleanup_e2e_database.sh

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./backend/coverage.xml
          flags: story-11-1-e2e
          name: Story 11-1 E2E Coverage

      - name: Archive test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: |
            backend/.pytest_cache/
            backend/htmlcov/
          retention-days: 30
